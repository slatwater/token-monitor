<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Token Monitor — Hack Progress</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a; color: #00ff41;
  font-family: "SF Mono", "Fira Code", "Cascadia Code", "Courier New", monospace;
  min-height: 100vh; overflow-x: hidden;
}

/* CRT 扫描线 */
body::after {
  content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px, transparent 1px, transparent 3px);
}

/* ─── 全局状态栏 ─────────────────────────────────────────────── */
.global-bar {
  position: sticky; top: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 20px;
  background: #0d0d0d; border-bottom: 1px solid #1a1a1a;
}
.logo { font-size: 11px; letter-spacing: 0.2em; color: #00ff41; text-shadow: 0 0 8px rgba(0,255,65,0.4); }
.logo .ver { color: #004400; }
.blink { animation: blink 1s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }
.global-stats { display: flex; gap: 24px; font-size: 11px; }
.gs-item { color: #004400; }
.gs-item span { color: #00ff41; font-weight: 700; }

/* ─── 面板容器 ───────────────────────────────────────────────── */
.targets { display: grid; grid-template-columns: repeat(auto-fill, minmax(520px, 1fr)); gap: 16px; padding: 16px; }

/* ─── 目标主机面板 ───────────────────────────────────────────── */
.panel {
  background: #0d0d0d; border: 1px solid #1a2a1a; border-radius: 3px;
  overflow: hidden; transition: opacity 1.5s, border-color 0.3s;
}
.panel.flash-green { animation: flashGreen 1.2s ease-out; }
@keyframes flashGreen { 0% { border-color: #00ff41; box-shadow: 0 0 20px rgba(0,255,65,0.4); } 100% { border-color: #1a2a1a; box-shadow: none; } }
.panel.flash-red { animation: flashRed 1.5s ease-out; }
@keyframes flashRed { 0% { border-color: #ff0040; box-shadow: 0 0 30px rgba(255,0,64,0.6); } 100% { border-color: #1a2a1a; box-shadow: none; } }

/* 面板头 */
.panel-header {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; background: #111; border-bottom: 1px solid #1a1a1a;
}
.window-dots { display: flex; gap: 5px; }
.window-dots i { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot-r { background: #ff5f57; }
.dot-y { background: #ffbd2e; }
.dot-g { background: #28c840; }
.target-label { flex: 1; font-size: 11px; color: #888; letter-spacing: 0.05em; }
.target-label b { color: #00ff41; font-weight: 700; }
.target-ip { font-size: 10px; color: #333; }
.status-badge {
  font-size: 9px; padding: 2px 8px; border-radius: 2px; letter-spacing: 0.1em; font-weight: 700;
  border: 1px solid currentColor;
}
.status-connected { color: #00ff41; }
.status-scanning { color: #ffaa00; }
.status-breached { color: #ff0040; }
.status-idle { color: #555; }
.panel.idle { opacity: 0.35; transition: opacity 0.5s; }
.panel-uptime { font-size: 10px; color: #333; font-variant-numeric: tabular-nums; }

/* 面板体 */
.panel-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

/* 扫描进度条 */
.scan-section { font-size: 10px; }
.scan-label { color: #004400; letter-spacing: 0.1em; margin-bottom: 4px; }
.scan-bar-wrap {
  background: #0a0a0a; border: 1px solid #1a2a1a; padding: 3px 6px;
  font-size: 12px; letter-spacing: 1px; display: flex; align-items: center; gap: 8px;
}
.scan-bar-text { white-space: pre; }
.scan-pct { font-weight: 700; min-width: 48px; text-align: right; }
.pressure-low { color: #00ff41; }
.pressure-mid { color: #ffaa00; text-shadow: 0 0 4px rgba(255,170,0,0.3); }
.pressure-high { color: #ff0040; text-shadow: 0 0 6px rgba(255,0,64,0.4); }
.scan-detail { font-size: 10px; color: #333; margin-top: 3px; }

/* 权限等级 */
.access-section { font-size: 10px; display: flex; align-items: center; gap: 10px; }
.access-label { color: #004400; letter-spacing: 0.1em; }
.access-bar { letter-spacing: 1px; font-size: 12px; }
.access-level-text { font-weight: 700; margin-left: 6px; }
.level-user { color: #004400; }
.level-root { color: #ffaa00; text-shadow: 0 0 4px rgba(255,170,0,0.3); }
.level-kernel { color: #ff0040; text-shadow: 0 0 6px rgba(255,0,64,0.4); }

/* 数据面板 */
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.metric { background: #080808; border: 1px solid #151515; padding: 6px 8px; border-radius: 2px; }
.metric-label { font-size: 8px; color: #333; letter-spacing: 0.1em; text-transform: uppercase; }
.metric-value { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 2px; }
.mv-msgs { color: #ffaa00; }
.mv-exfil { color: #00ff41; text-shadow: 0 0 4px rgba(0,255,65,0.3); }
.mv-payload { color: #00ccff; }
.mv-cache { color: #005500; }

/* 事件流 */
.feed-section { border-top: 1px solid #151515; padding-top: 8px; }
.feed-label { font-size: 9px; color: #333; letter-spacing: 0.1em; margin-bottom: 4px; }
.feed { max-height: 200px; overflow-y: auto; overflow-x: hidden; }
.feed-line {
  font-size: 10px; line-height: 1.7; color: #2a4a2a; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; transition: color 2s;
}
.feed-line.recent { color: #00ff41; text-shadow: 0 0 4px rgba(0,255,65,0.3); }
.feed-line .f-time { color: #333; }
.feed-line .f-port { color: #008800; }
.feed-line .f-status { color: #00ff41; }
.feed-line .f-in { color: #00ccff; }
.feed-line .f-out { color: #00ff41; }
.feed-line .f-cache { color: #004400; }

/* 异常数据行 */
.feed-line.alert-line { color: #ff0040; text-shadow: 0 0 6px rgba(255,0,64,0.4); background: rgba(255,0,64,0.06); }
.feed-line .f-surge { color: #ff0040; font-weight: 700; }

/* 断连覆盖 */
.disconnect-overlay {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(10,10,10,0.85); font-size: 12px; color: #ff0040; letter-spacing: 0.15em;
  animation: fadeIn 0.5s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* 空状态 */
.empty-state {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  text-align: center; color: #1a3a1a;
}
.empty-state .line { font-size: 12px; line-height: 2.2; letter-spacing: 0.1em; }
.empty-state .prompt { color: #004400; }

/* 全局警告 */
.alert-toast {
  position: fixed; top: 52px; left: 50%; transform: translateX(-50%); z-index: 200;
  background: rgba(255,0,64,0.1); border: 1px solid #ff0040; color: #ff0040;
  font-size: 11px; padding: 6px 20px; letter-spacing: 0.05em;
  animation: alertFade 4s ease-out forwards; white-space: nowrap;
}
@keyframes alertFade { 0%,60% { opacity:1; } 100% { opacity:0; pointer-events:none; } }

/* 连接动画 */
.connect-log { padding: 12px; font-size: 11px; line-height: 1.8; }
.connect-log .cl { opacity: 0; animation: typeIn 0.3s forwards; }
.cl-ok { color: #00ff41; }
.cl-info { color: #004400; }
@keyframes typeIn { to { opacity: 1; } }
</style>
</head>
<body>

<div class="global-bar">
  <div class="logo">HACK PROGRESS <span class="ver">v2.0</span><span class="blink">_</span></div>
  <div class="global-stats">
    <div class="gs-item">ACTIVE TARGETS: <span id="gTargets">0</span></div>
    <div class="gs-item">TOTAL EXFIL: <span id="gExfil">0</span></div>
    <div class="gs-item">UPTIME: <span id="gUptime">00:00:00</span></div>
  </div>
</div>

<div class="targets" id="targets"></div>
<div class="empty-state" id="emptyState" style="display:none">
  <div class="line prompt">&gt; SCANNING NETWORK...<span class="blink">_</span></div>
  <div class="line">0 TARGETS FOUND</div>
  <div class="line">WAITING FOR ACTIVITY...</div>
</div>

<script>
// ─── 状态 ─────────────────────────────────────────────────────────────
const state = { projects: {} };
const startTime = Date.now();
let panelCounter = 0;

// ─── 工具函数 ─────────────────────────────────────────────────────────
function fmt(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}

function hashCode(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return h;
}

function fakeIP(sessionId) {
  if (!sessionId) return '0.0.0.0';
  const h = Math.abs(hashCode(sessionId));
  return `${10 + (h & 0xFF) % 246}.${(h >> 8) & 0xFF}.${(h >> 16) & 0xFF}.${(h >> 24) & 0xFF}`;
}

function shortModel(m) {
  return m.replace('claude-', '').replace('-20251001', '').replace('-4-6', '4.6').replace('-4-5', '4.5');
}

function fmtDuration(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function safeId(name) { return 'p_' + name.replace(/[^a-zA-Z0-9]/g, '_'); }

function getStatus(summary) {
  const t = summary.total_output;
  if (t > 500000) return { text: 'BREACHED', cls: 'status-breached' };
  if (t > 50000) return { text: 'SCANNING', cls: 'status-scanning' };
  return { text: 'CONNECTED', cls: 'status-connected' };
}

function getModelInfo(events) {
  let best = 0, bestName = 'none';
  for (const e of events) {
    if (e.model.includes('opus') && best < 3) { best = 3; bestName = shortModel(e.model); }
    else if (e.model.includes('sonnet') && best < 2) { best = 2; bestName = shortModel(e.model); }
    else if (e.model.includes('haiku') && best < 1) { best = 1; bestName = shortModel(e.model); }
  }
  if (best >= 3) return { bar: '█████', text: bestName, cls: 'level-kernel' };
  if (best >= 2) return { bar: '███░░', text: bestName, cls: 'level-root' };
  if (best >= 1) return { bar: '█░░░░', text: bestName, cls: 'level-user' };
  return { bar: '░░░░░', text: 'none', cls: 'level-user' };
}

const CTX_WINDOW = 1_000_000;

function calcContextPressure(events) {
  // 每个 session 取最新一条，算各自的上下文大小，返回峰值
  const latest = {};
  for (const e of events) latest[e.session_id] = e;
  let maxCtx = 0;
  for (const e of Object.values(latest)) {
    const ctx = e.input_tokens + e.cache_read + e.cache_creation;
    if (ctx > maxCtx) maxCtx = ctx;
  }
  const sessions = Object.keys(latest).length;
  return { tokens: maxCtx, pct: maxCtx / CTX_WINDOW, sessions };
}

function pressureBar(pct, w) {
  w = w || 30;
  const filled = Math.round(Math.min(1, pct) * w);
  return '\u2588'.repeat(filled) + '\u2591'.repeat(w - filled);
}

function pressureCls(pct) {
  if (pct > 0.7) return 'pressure-high';
  if (pct > 0.3) return 'pressure-mid';
  return 'pressure-low';
}

function fakePort(sessionId) {
  return 443 + Math.abs(hashCode(sessionId || '')) % 9000;
}

function formatEvent(e) {
  const t = e.timestamp ? new Date(e.timestamp).toLocaleTimeString('en-US', { hour12: false }) : '--:--:--';
  const port = fakePort(e.session_id);
  const model = shortModel(e.model);
  const cache = e.cache_read + e.cache_creation;
  return `<span class="f-time">[${t}]</span> <span class="f-port">PORT ${port}/${model}</span> <span class="f-in">in:${fmt(e.input_tokens)}</span> <span class="f-out">out:${fmt(e.output_tokens)}</span> <span class="f-cache">cache:${fmt(cache)}</span>`;
}

// ─── 异常检测 ─────────────────────────────────────────────────────────
function detectAnomaly(name, newEvents) {
  const p = state.projects[name];
  if (!p || p.summary.message_count < 5) return [];
  const avgIn = p.summary.total_input / p.summary.message_count;
  const avgOut = p.summary.total_output / p.summary.message_count;
  const anomalies = [];
  for (const e of newEvents) {
    const rIn = avgIn > 0 ? e.input_tokens / avgIn : 0;
    const rOut = avgOut > 0 ? e.output_tokens / avgOut : 0;
    const max = Math.max(rIn, rOut);
    if (max >= 5) anomalies.push({ event: e, ratio: max, field: rIn > rOut ? 'input' : 'output' });
  }
  return anomalies;
}

// ─── 面板 CRUD ────────────────────────────────────────────────────────
function createPanel(name, data) {
  const id = safeId(name);
  // 防重复：同名面板已存在时先销毁旧的
  if (state.projects[name]) {
    const oldEl = document.getElementById(state.projects[name].panelId);
    if (oldEl) oldEl.remove();
    delete state.projects[name];
  }
  const pid = panelCounter++;
  const lastSession = data.events.length > 0 ? data.events[data.events.length - 1].session_id : '';
  const ip = fakeIP(lastSession);
  const st = getStatus(data.summary);
  const al = getModelInfo(data.events);
  const cp = calcContextPressure(data.events);
  const firstTs = data.events.length > 0 ? new Date(data.events[0].timestamp).getTime() : Date.now();

  state.projects[name] = {
    events: data.events,
    summary: { ...data.summary },
    firstTime: firstTs,
    panelId: id,
  };

  const recentEvents = data.events.slice(-10);
  const feedHTML = recentEvents.map(e =>
    `<div class="feed-line">${formatEvent(e)}</div>`
  ).join('');

  const html = `
  <div class="panel" id="${id}" style="position:relative">
    <div class="panel-header">
      <div class="window-dots"><i class="dot-r"></i><i class="dot-y"></i><i class="dot-g"></i></div>
      <div class="target-label">TARGET: <b>${name}</b></div>
      <div class="target-ip">${ip}</div>
      <div class="status-badge ${st.cls}" id="${id}_status">${st.text}</div>
      <div class="panel-uptime" id="${id}_uptime">00:00:00</div>
    </div>
    <div class="panel-body">
      <div class="scan-section">
        <div class="scan-label">CONTEXT PRESSURE</div>
        <div class="scan-bar-wrap">
          <span class="scan-bar-text ${pressureCls(cp.pct)}" id="${id}_bar">${pressureBar(cp.pct)}</span>
          <span class="scan-pct ${pressureCls(cp.pct)}" id="${id}_pct">${(cp.pct * 100).toFixed(1)}%</span>
        </div>
        <div class="scan-detail" id="${id}_scanDetail">${fmt(cp.tokens)} / 1M · peak of ${cp.sessions} session${cp.sessions > 1 ? 's' : ''}</div>
      </div>
      <div class="access-section">
        <span class="access-label">MODEL:</span>
        <span class="access-bar ${al.cls}" id="${id}_alBar">${al.bar}</span>
        <span class="access-level-text ${al.cls}" id="${id}_alText">${al.text}</span>
      </div>
      <div class="metrics">
        <div class="metric"><div class="metric-label">消息数</div><div class="metric-value mv-msgs" id="${id}_msgs">${data.summary.message_count}</div></div>
        <div class="metric"><div class="metric-label">输出 tokens</div><div class="metric-value mv-exfil" id="${id}_exfil">${fmt(data.summary.total_output)}</div></div>
        <div class="metric"><div class="metric-label">输入 tokens</div><div class="metric-value mv-payload" id="${id}_payload">${fmt(data.summary.total_input)}</div></div>
        <div class="metric"><div class="metric-label">缓存命中</div><div class="metric-value mv-cache" id="${id}_cache">${fmt(data.summary.total_cache_read)}</div></div>
      </div>
      <div class="feed-section">
        <div class="feed-label">PORT SCAN — EVENT STREAM</div>
        <div class="feed" id="${id}_feed">${feedHTML}</div>
      </div>
    </div>
  </div>`;

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('targets').insertAdjacentHTML('beforeend', html);
}

function updatePanel(name) {
  const p = state.projects[name];
  if (!p) return;
  const id = p.panelId;
  const s = p.summary;

  // 状态
  const st = getStatus(s);
  const stEl = document.getElementById(`${id}_status`);
  if (stEl) { stEl.textContent = st.text; stEl.className = `status-badge ${st.cls}`; }

  // 上下文压力
  const cp = calcContextPressure(p.events);
  const cls = pressureCls(cp.pct);
  const barEl = document.getElementById(`${id}_bar`);
  const pctEl = document.getElementById(`${id}_pct`);
  const detailEl = document.getElementById(`${id}_scanDetail`);
  if (barEl) { barEl.textContent = pressureBar(cp.pct); barEl.className = `scan-bar-text ${cls}`; }
  if (pctEl) { pctEl.textContent = (cp.pct * 100).toFixed(1) + '%'; pctEl.className = `scan-pct ${cls}`; }
  if (detailEl) detailEl.textContent = `${fmt(cp.tokens)} / 1M · peak of ${cp.sessions} session${cp.sessions > 1 ? 's' : ''}`;

  // 权限
  const al = getModelInfo(p.events);
  const alBar = document.getElementById(`${id}_alBar`);
  const alText = document.getElementById(`${id}_alText`);
  if (alBar) { alBar.textContent = al.bar; alBar.className = `access-bar ${al.cls}`; }
  if (alText) { alText.textContent = al.text; alText.className = `access-level-text ${al.cls}`; }

  // 指标
  const set = (suffix, val) => { const el = document.getElementById(`${id}_${suffix}`); if (el) el.textContent = val; };
  set('msgs', s.message_count);
  set('exfil', fmt(s.total_output));
  set('payload', fmt(s.total_input));
  set('cache', fmt(s.total_cache_read));
}

function addFeedLines(name, events, anomalyMap) {
  const p = state.projects[name];
  if (!p) return;
  const feed = document.getElementById(`${p.panelId}_feed`);
  if (!feed) return;

  // 移除旧的高亮
  feed.querySelectorAll('.recent').forEach(el => el.classList.remove('recent'));

  for (const e of events) {
    const line = document.createElement('div');
    const anomaly = anomalyMap && anomalyMap.get(e);
    if (anomaly) {
      line.className = 'feed-line alert-line';
      line.innerHTML = formatEvent(e) + ` <span class="f-surge">[${anomaly.field} ${Math.round(anomaly.ratio)}x]</span>`;
    } else {
      line.className = 'feed-line recent';
      line.innerHTML = formatEvent(e);
      setTimeout(() => line.classList.remove('recent'), 2000);
    }
    feed.appendChild(line);
  }

  // 限制 feed 行数
  while (feed.children.length > 10) feed.removeChild(feed.firstChild);
  feed.scrollTop = feed.scrollHeight;
}

function flashPanel(name, type) {
  const p = state.projects[name];
  if (!p) return;
  const el = document.getElementById(p.panelId);
  if (!el) return;
  el.classList.remove('flash-green', 'flash-red');
  void el.offsetWidth;
  el.classList.add(type === 'red' ? 'flash-red' : 'flash-green');
  setTimeout(() => el.classList.remove('flash-green', 'flash-red'), 1500);
}

function triggerAnomaly(name, anomalies) {
  flashPanel(name, 'red');

  // 全局警告
  const best = anomalies.reduce((a, b) => a.ratio > b.ratio ? a : b);
  const toast = document.createElement('div');
  toast.className = 'alert-toast';
  toast.textContent = `[!] ${name}: ${best.field} surge ${Math.round(best.ratio)}x`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

function disconnectPanel(name) {
  const p = state.projects[name];
  if (!p) return;
  const el = document.getElementById(p.panelId);
  if (el) {
    // 覆盖断连提示
    const overlay = document.createElement('div');
    overlay.className = 'disconnect-overlay';
    overlay.textContent = '[!] CONNECTION LOST...';
    el.appendChild(overlay);
    // 淡出
    setTimeout(() => {
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 1500);
    }, 1500);
  }
  delete state.projects[name];
  updateGlobalBar();

  // 全空时显示空状态
  if (Object.keys(state.projects).length === 0) {
    document.getElementById('emptyState').style.display = '';
  }
}

function idlePanel(name) {
  const p = state.projects[name];
  if (!p) return;
  p.idle = true;
  const el = document.getElementById(p.panelId);
  if (el) el.classList.add('idle');
  const stEl = document.getElementById(`${p.panelId}_status`);
  if (stEl) { stEl.textContent = 'IDLE'; stEl.className = 'status-badge status-idle'; }
}

function resumePanel(name) {
  const p = state.projects[name];
  if (!p) return;
  p.idle = false;
  const el = document.getElementById(p.panelId);
  if (el) el.classList.remove('idle');
  flashPanel(name, 'green');
}

// ─── 全局状态栏 ────────────────────────────────────────────────────────
function updateGlobalBar() {
  const projects = Object.values(state.projects);
  document.getElementById('gTargets').textContent = projects.length;
  const totalExfil = projects.reduce((sum, p) => sum + p.summary.total_output, 0);
  document.getElementById('gExfil').textContent = fmt(totalExfil);
}

function updateTimers() {
  // 全局 uptime
  document.getElementById('gUptime').textContent = fmtDuration(Date.now() - startTime);
  // 每个面板的 uptime
  for (const [name, p] of Object.entries(state.projects)) {
    const el = document.getElementById(`${p.panelId}_uptime`);
    if (el) el.textContent = fmtDuration(Date.now() - p.firstTime);
  }
}

// ─── 初始化 + 轮询 ────────────────────────────────────────────────────
async function init() {
  const data = await fetch('/api/live/multi/init').then(r => r.json());
  const names = Object.keys(data);

  if (names.length === 0) {
    document.getElementById('emptyState').style.display = '';
    return;
  }

  for (const name of names) {
    createPanel(name, data[name]);
  }
  updateGlobalBar();
}

async function poll() {
  try {
    const data = await fetch('/api/live/multi/poll').then(r => r.json());

    // 闲置（变灰保留）
    const idle = data._idle;
    if (idle) {
      for (const name of idle) idlePanel(name);
      delete data._idle;
    }

    // 长时间闲置 → 真正移除
    const remove = data._remove;
    if (remove) {
      for (const name of remove) disconnectPanel(name);
      delete data._remove;
    }

    for (const [name, val] of Object.entries(data)) {
      // 新项目上线
      if (val.is_new) {
        createPanel(name, val);
        flashPanel(name, 'green');
        continue;
      }

      // 闲置项目恢复
      if (val.resumed) resumePanel(name);

      const p = state.projects[name];
      if (!p) continue;
      const newEvents = val.events || [];
      if (newEvents.length === 0) continue;

      // 异常检测
      const anomalies = detectAnomaly(name, newEvents);

      // 更新数据
      p.events.push(...newEvents);
      if (p.events.length > 200) p.events.splice(0, p.events.length - 200);
      for (const e of newEvents) {
        p.summary.total_input += e.input_tokens;
        p.summary.total_output += e.output_tokens;
        p.summary.total_cache_read += e.cache_read;
        p.summary.total_cache_creation += e.cache_creation;
        p.summary.message_count += 1;
      }

      updatePanel(name);

      // 构建异常映射：event → anomaly info
      const anomalyMap = new Map();
      for (const a of anomalies) anomalyMap.set(a.event, a);

      addFeedLines(name, newEvents, anomalyMap);
      flashPanel(name, anomalies.length > 0 ? 'red' : 'green');

      if (anomalies.length > 0) triggerAnomaly(name, anomalies);
    }

    updateGlobalBar();
  } catch (err) {
    console.error('poll:', err);
  }
}

init().then(() => {
  setInterval(poll, 3000);
  setInterval(updateTimers, 1000);
});
</script>
