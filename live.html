<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Token Monitor — 粒子宇宙</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a12; color: #e0e0e0; font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif; overflow: hidden; }
  canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }

  /* 顶部状态栏 */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 24px;
    background: linear-gradient(180deg, rgba(10,10,18,0.9) 0%, transparent 100%);
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar h1 { font-size: 14px; font-weight: 500; color: #888; letter-spacing: 0.08em; text-transform: uppercase; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; box-shadow: 0 0 6px #4ade80; } 50% { opacity:.4; box-shadow: none; } }
  .back-link { font-size: 12px; color: #555; text-decoration: none; }
  .back-link:hover { color: #999; }

  /* 详情面板 */
  .detail-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    z-index: 20; background: rgba(10,10,18,0.85); backdrop-filter: blur(12px);
  }
  .detail-overlay.active { display: flex; justify-content: center; align-items: flex-start; padding-top: 60px; }
  .detail-box {
    background: rgba(20,20,32,0.95); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; width: 90%; max-width: 720px; max-height: 80vh; overflow-y: auto;
    padding: 24px;
  }
  .detail-close {
    float: right; background: none; border: none; color: #666; font-size: 22px;
    cursor: pointer; line-height: 1;
  }
  .detail-close:hover { color: #fff; }
  .detail-name { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
  .detail-stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px;
  }
  .ds { text-align: center; }
  .ds-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.06em; }
  .ds-value { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .detail-feed { max-height: 400px; overflow-y: auto; }
  .df-row {
    display: grid; grid-template-columns: 80px 90px 65px 65px 65px 1fr;
    gap: 2px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 12px; font-variant-numeric: tabular-nums;
  }
  .df-time { color: #666; }
  .model-tag {
    display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 3px;
  }
  .model-tag.opus { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .model-tag.sonnet { background: rgba(96,165,250,0.15); color: #60a5fa; }
  .model-tag.haiku { background: rgba(52,211,153,0.15); color: #34d399; }
  .v-in { color: #60a5fa; }
  .v-out { color: #fb923c; }
  .v-cache { color: #4ade80; }

  /* 提示文字 */
  .hint {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: #333; z-index: 10; letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="topbar">
  <div class="topbar-left">
    <div class="live-dot"></div>
    <h1>Token Universe</h1>
  </div>
  <a href="/" class="back-link">← 总览</a>
</div>

<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-box">
    <button class="detail-close" onclick="closeDetail()">&times;</button>
    <div class="detail-name" id="detailName"></div>
    <div class="detail-stats" id="detailStats"></div>
    <div class="detail-feed" id="detailFeed"></div>
  </div>
</div>

<div class="hint">点击星云查看详情</div>

<script>
// ─── 配置 ─────────────────────────────────────────────────────────────
const COLORS = [
  { core: '#00e5ff', glow: 'rgba(0,229,255,', name: 'cyan' },
  { core: '#ff9100', glow: 'rgba(255,145,0,', name: 'orange' },
  { core: '#e040fb', glow: 'rgba(224,64,251,', name: 'purple' },
  { core: '#76ff03', glow: 'rgba(118,255,3,', name: 'lime' },
  { core: '#ff1744', glow: 'rgba(255,23,68,', name: 'red' },
];

// ─── Canvas ───────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── 背景星星 ─────────────────────────────────────────────────────────
const stars = [];
for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * 3000 - 500,
    y: Math.random() * 2000 - 300,
    r: Math.random() * 1.2 + 0.2,
    a: Math.random() * 0.5 + 0.2,
    twinkleSpeed: Math.random() * 0.02 + 0.005,
    twinkleOffset: Math.random() * Math.PI * 2,
  });
}

function drawStars(t) {
  for (const s of stars) {
    const a = s.a * (0.6 + 0.4 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,210,255,${a})`;
    ctx.fill();
  }
}

// ─── 粒子系统 ─────────────────────────────────────────────────────────
class Particle {
  constructor(cx, cy, color, isBurst) {
    this.cx = cx;
    this.cy = cy;
    const angle = Math.random() * Math.PI * 2;
    const dist = isBurst ? Math.random() * 8 + 2 : Math.random() * 60 + 10;
    this.x = cx + Math.cos(angle) * dist;
    this.y = cy + Math.sin(angle) * dist;
    this.vx = (Math.random() - 0.5) * (isBurst ? 3 : 0.15);
    this.vy = (Math.random() - 0.5) * (isBurst ? 3 : 0.15);
    this.life = isBurst ? 1.0 : 0.6 + Math.random() * 0.4;
    this.decay = isBurst ? 0.008 + Math.random() * 0.01 : 0.0005 + Math.random() * 0.001;
    this.r = isBurst ? Math.random() * 3 + 1.5 : Math.random() * 2 + 0.5;
    this.color = color;
    this.orbitAngle = angle;
    this.orbitSpeed = (Math.random() - 0.5) * 0.008;
    this.orbitDist = dist;
    this.isBurst = isBurst;
  }

  update() {
    if (this.isBurst) {
      this.x += this.vx;
      this.y += this.vy;
      this.vx *= 0.98;
      this.vy *= 0.98;
    } else {
      this.orbitAngle += this.orbitSpeed;
      const targetX = this.cx + Math.cos(this.orbitAngle) * this.orbitDist;
      const targetY = this.cy + Math.sin(this.orbitAngle) * this.orbitDist;
      this.x += (targetX - this.x) * 0.02;
      this.y += (targetY - this.y) * 0.02;
    }
    this.life -= this.decay;
  }

  draw() {
    if (this.life <= 0) return;
    const a = Math.min(this.life, 1);
    // glow
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * 3, 0, Math.PI * 2);
    ctx.fillStyle = this.color.glow + (a * 0.15) + ')';
    ctx.fill();
    // core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = this.color.glow + a + ')';
    ctx.fill();
  }
}

// ─── 星云（项目） ─────────────────────────────────────────────────────
class Nebula {
  constructor(name, color, cx, cy) {
    this.name = name;
    this.color = color;
    this.cx = cx;
    this.cy = cy;
    this.particles = [];
    this.summary = { total_input: 0, total_output: 0, total_cache_read: 0, total_cache_creation: 0, message_count: 0 };
    this.events = [];
    this.baseRadius = 30;
    this.targetRadius = 30;
    this.currentRadius = 30;
    this.pulsePhase = Math.random() * Math.PI * 2;
    // 初始粒子
    for (let i = 0; i < 20; i++) {
      this.particles.push(new Particle(cx, cy, color, false));
    }
  }

  get totalTokens() {
    return this.summary.total_input + this.summary.total_output;
  }

  burst(count) {
    const n = Math.min(count * 8, 60);
    for (let i = 0; i < n; i++) {
      this.particles.push(new Particle(this.cx, this.cy, this.color, true));
    }
    // 也补充轨道粒子
    for (let i = 0; i < Math.min(count * 2, 15); i++) {
      this.particles.push(new Particle(this.cx, this.cy, this.color, false));
    }
  }

  updateRadius() {
    // 根据 token 量调整半径
    const t = this.totalTokens;
    if (t > 0) {
      this.targetRadius = Math.min(35 + Math.log10(t) * 12, 120);
    }
    this.currentRadius += (this.targetRadius - this.currentRadius) * 0.03;
    // 更新轨道粒子的范围
    for (const p of this.particles) {
      if (!p.isBurst && p.orbitDist > this.currentRadius * 1.5) {
        p.orbitDist = Math.random() * this.currentRadius + 10;
      }
    }
  }

  update(t) {
    this.updateRadius();
    this.pulsePhase += 0.02;
    // 更新粒子
    for (let i = this.particles.length - 1; i >= 0; i--) {
      this.particles[i].update();
      if (this.particles[i].life <= 0) {
        if (!this.particles[i].isBurst) {
          // 轨道粒子重生
          this.particles[i] = new Particle(this.cx, this.cy, this.color, false);
        } else {
          this.particles.splice(i, 1);
        }
      }
    }
    // 限制粒子数
    if (this.particles.length > 300) {
      this.particles.splice(0, this.particles.length - 300);
    }
  }

  draw(t) {
    const pulse = 1 + 0.05 * Math.sin(this.pulsePhase);
    const r = this.currentRadius * pulse;

    // 外层辉光
    const grad = ctx.createRadialGradient(this.cx, this.cy, 0, this.cx, this.cy, r * 2);
    grad.addColorStop(0, this.color.glow + '0.06)');
    grad.addColorStop(0.5, this.color.glow + '0.02)');
    grad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(this.cx, this.cy, r * 2, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // 核心辉光
    const coreGrad = ctx.createRadialGradient(this.cx, this.cy, 0, this.cx, this.cy, r * 0.6);
    coreGrad.addColorStop(0, this.color.glow + '0.12)');
    coreGrad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(this.cx, this.cy, r * 0.6, 0, Math.PI * 2);
    ctx.fillStyle = coreGrad;
    ctx.fill();

    // 粒子
    for (const p of this.particles) {
      p.draw();
    }

    // 项目名
    ctx.fillStyle = this.color.glow + '0.9)';
    ctx.font = '600 14px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(this.name, this.cx, this.cy - r - 16);

    // token 数字
    ctx.fillStyle = this.color.glow + '0.5)';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.fillText(fmt(this.totalTokens), this.cx, this.cy - r - 4);

    // 消息数
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = '10px -apple-system, sans-serif';
    ctx.fillText(this.summary.message_count + ' msgs', this.cx, this.cy + r + 20);
  }

  hitTest(mx, my) {
    const dx = mx - this.cx;
    const dy = my - this.cy;
    return Math.sqrt(dx * dx + dy * dy) < this.currentRadius * 2;
  }
}

// ─── 工具函数 ─────────────────────────────────────────────────────────
function fmt(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}

function modelTag(name) {
  const short = name.replace('claude-', '').replace('-20251001', '');
  let cls = '';
  if (name.includes('opus')) cls = 'opus';
  else if (name.includes('sonnet')) cls = 'sonnet';
  else if (name.includes('haiku')) cls = 'haiku';
  return `<span class="model-tag ${cls}">${short}</span>`;
}

function timeStr(ts) {
  if (!ts) return '-';
  return new Date(ts).toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

// ─── 状态 ─────────────────────────────────────────────────────────────
const nebulae = [];
let hoveredNebula = null;

// ─── 数据 ─────────────────────────────────────────────────────────────
async function initData() {
  const data = await fetch('/api/live/multi/init').then(r => r.json());
  const names = Object.keys(data);
  const count = names.length;

  // 布局：均匀分布在画面中
  const centerX = W / 2;
  const centerY = H / 2;
  const layoutRadius = Math.min(W, H) * 0.28;

  names.forEach((name, i) => {
    const angle = (i / count) * Math.PI * 2 - Math.PI / 2;
    const cx = centerX + Math.cos(angle) * layoutRadius;
    const cy = centerY + Math.sin(angle) * layoutRadius;
    const color = COLORS[i % COLORS.length];

    const neb = new Nebula(name, color, cx, cy);
    const gd = data[name];
    neb.events = gd.events || [];
    neb.summary = gd.summary;
    neb.updateRadius();
    neb.currentRadius = neb.targetRadius;

    // 根据已有数据量调整初始粒子
    const extraParticles = Math.min(Math.floor(neb.totalTokens / 5000), 80);
    for (let j = 0; j < extraParticles; j++) {
      neb.particles.push(new Particle(cx, cy, color, false));
    }

    nebulae.push(neb);
  });
}

async function poll() {
  try {
    const data = await fetch('/api/live/multi/poll').then(r => r.json());
    for (const [name, val] of Object.entries(data)) {
      const neb = nebulae.find(n => n.name === name);
      if (!neb) continue;
      const newEvents = val.events || [];
      if (newEvents.length === 0) continue;

      neb.events.push(...newEvents);
      for (const e of newEvents) {
        neb.summary.total_input += e.input_tokens;
        neb.summary.total_output += e.output_tokens;
        neb.summary.total_cache_read += e.cache_read;
        neb.summary.total_cache_creation += e.cache_creation;
        neb.summary.message_count += 1;
      }
      neb.burst(newEvents.length);
    }
  } catch (err) {
    console.error('poll error:', err);
  }
}

// ─── 交互 ─────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', (e) => {
  hoveredNebula = null;
  for (const neb of nebulae) {
    if (neb.hitTest(e.clientX, e.clientY)) {
      hoveredNebula = neb;
      canvas.style.cursor = 'pointer';
      return;
    }
  }
  canvas.style.cursor = 'default';
});

canvas.addEventListener('click', (e) => {
  for (const neb of nebulae) {
    if (neb.hitTest(e.clientX, e.clientY)) {
      showDetail(neb);
      return;
    }
  }
});

function showDetail(neb) {
  const overlay = document.getElementById('detailOverlay');
  document.getElementById('detailName').style.color = neb.color.core;
  document.getElementById('detailName').textContent = neb.name;

  const s = neb.summary;
  document.getElementById('detailStats').innerHTML = `
    <div class="ds"><div class="ds-label">输入</div><div class="ds-value v-in">${fmt(s.total_input)}</div></div>
    <div class="ds"><div class="ds-label">输出</div><div class="ds-value v-out">${fmt(s.total_output)}</div></div>
    <div class="ds"><div class="ds-label">缓存读取</div><div class="ds-value v-cache">${fmt(s.total_cache_read)}</div></div>
    <div class="ds"><div class="ds-label">缓存创建</div><div class="ds-value" style="color:#a78bfa">${fmt(s.total_cache_creation)}</div></div>
  `;

  const reversed = [...neb.events].reverse().slice(0, 80);
  document.getElementById('detailFeed').innerHTML = reversed.length === 0
    ? '<div style="padding:20px;text-align:center;color:#444">最近 24h 无消息</div>'
    : reversed.map(e => {
        const cache = e.cache_read + e.cache_creation;
        return `
          <div class="df-row">
            <div class="df-time">${timeStr(e.timestamp)}</div>
            <div>${modelTag(e.model)}</div>
            <div class="v-in">${fmt(e.input_tokens)}</div>
            <div class="v-out">${fmt(e.output_tokens)}</div>
            <div class="v-cache">${fmt(cache)}</div>
            <div style="color:#333;font-size:10px">${e.session_id.slice(0,8)}</div>
          </div>
        `;
      }).join('');

  overlay.classList.add('active');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('active');
}

// ─── 渲染循环 ─────────────────────────────────────────────────────────
let frame = 0;
function render() {
  frame++;
  ctx.clearRect(0, 0, W, H);

  // 背景
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);

  drawStars(frame);

  // 连线（微弱）
  for (let i = 0; i < nebulae.length; i++) {
    for (let j = i + 1; j < nebulae.length; j++) {
      const a = nebulae[i], b = nebulae[j];
      ctx.beginPath();
      ctx.moveTo(a.cx, a.cy);
      ctx.lineTo(b.cx, b.cy);
      ctx.strokeStyle = 'rgba(255,255,255,0.015)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }

  for (const neb of nebulae) {
    neb.update(frame);
    neb.draw(frame);
  }

  // hover 高亮
  if (hoveredNebula) {
    const r = hoveredNebula.currentRadius * 2.5;
    const grad = ctx.createRadialGradient(hoveredNebula.cx, hoveredNebula.cy, 0, hoveredNebula.cx, hoveredNebula.cy, r);
    grad.addColorStop(0, hoveredNebula.color.glow + '0.08)');
    grad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(hoveredNebula.cx, hoveredNebula.cy, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  requestAnimationFrame(render);
}

// ─── 启动 ─────────────────────────────────────────────────────────────
initData().then(() => {
  render();
  setInterval(poll, 3000);
});
</script>
</body>
</html>
